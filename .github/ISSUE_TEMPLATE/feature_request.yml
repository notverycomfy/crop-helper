name: Feature request
description: Suggest an improvement for Crop Helper.
title: "[Suggestion]: "
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Explain the idea and the player experience it would improve.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched for an existing suggestion.
          required: true
